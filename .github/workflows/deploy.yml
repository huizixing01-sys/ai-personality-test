name: Deploy to CloudBase Static Hosting

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Deploy to CloudBase Static Hosting
        env:
          TENCENTCLOUD_SECRETID: ${{ secrets.TCB_SECRET_ID }}
          TENCENTCLOUD_SECRETKEY: ${{ secrets.TCB_SECRET_KEY }}
        run: tcb hosting deploy ./out / -e ${{ secrets.TCB_ENV_ID }}
